services:
  oracle-free:
    image: container-registry.oracle.com/database/free:latest
    profiles: ["freepdb"]
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: ${DEEPAGENTS_ORACLE_PASSWORD:-DeepAgents2024}
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD-SHELL", "echo 'SELECT 1 FROM DUAL;' | sqlplus -s sys/${DEEPAGENTS_ORACLE_PASSWORD:-DeepAgents2024}@localhost:1521/FREEPDB1 as sysdba || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  oracle-adb:
    profiles: ["adb"]
    image: container-registry.oracle.com/database/instantclient:latest
    environment:
      DEEPAGENTS_ORACLE_DSN: ${DEEPAGENTS_ORACLE_DSN}
      DEEPAGENTS_ORACLE_WALLET_PATH: ${DEEPAGENTS_ORACLE_WALLET_PATH:-}
    command: ["echo", "ADB mode - configure via environment variables"]

volumes:
  oracle-data:
